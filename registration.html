<!DOCTYPE html>
<html>
<head>
  <title>Registration Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

  <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light">
    <div class="card p-4 shadow" style="width: 600px;">
      <h3 class="text-center mb-2">Registration Form</h3>

      <form onsubmit="submitForm(event)">

        <div class="mb-2">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-2">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" placeholder="Enter your age">
        </div>

        <div class="mb-2">
          <label class="form-label">Email</label>
          <input type="text" class="form-control" placeholder="Enter your Email">
        </div>

        <div class="mb-2">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter your password">
        </div>

        <div class="mb-2">
          <label class="form-label">Gender</label>
          <select class="form-select">
            <option value=""> Select Gender </option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="mb-2">
          <label class="form-label">Blood Group</label>
          <select class="form-select">
            <option value=""> Select Blood Group </option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB">AB</option>
          </select>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>

      </form>
      <p id="msg" class="text-success text-center mt-1"></p>
    </div>
  </div>

  <script>
    function submitForm(event) {
      event.preventDefault();
      document.getElementById("msg").innerHTML = "Submitted Successfully!";
    }
  </script>

</body>
