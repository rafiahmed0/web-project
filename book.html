<!DOCTYPE html>
<html>

<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="min-vh-100 d-flex justify-content-center align-items-center bg-light">
        <div class="card p-4 shadow" style="width: 600px;">
            <h3 class="text-center mb-2">Book Appointment</h3>

            <form onsubmit="submitForm(event)">

                <div class="mb-2">
                    <label class="form-label">Patient Name</label>
          <input type=" text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="mb-2">
                    <label class="form-label">E-mail</label>
                    <input type="text" class="form-control" placeholder="Enter your E-mail">
                </div>

                <div class="mb-2">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" placeholder="Enter your phone number">
                </div>

                <div class="mb-2">
                    <label class="form-label">Doctor's Name</label>
                    <select class="form-select">
                        <option value=""> Select Doctor </option>
                        <option value="Dr. Smith">Dr.Ziaul Answar</option>
                        <option value="Dr. Johnson">Dr.Mahfuzul Hoque</option>
                        <option value="Dr. Williams">Dr.Dev Protim Barua</option>
                    </select>
                </div>

                <div class="mb-2">
                    <label class="form-label">Time Slot</label>
                    <select class="form-select">
                        <option value=""> Select Time </option>
                        <option value="9:00 AM-10:00 AM">9:00 AM - 10.00AM</option>
                        <option value="12.00 PM - 3.00PM">12.00 PM - 3.00PM</option>
                        <option value="6.00 PM - 11.00 PM">6.00 PM - 11.00 PM</option>

                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>

            </form>

            <p id="msg" class="text-success text-center mt-1"></p>
        </div>
    </div>

    <script>
        function submitForm(event) {
            event.preventDefault();
            document.getElementById("msg").innerHTML = "Submitted Successfully!";
        }
    </script>

</body>

</html>
